name: Deploy to GitHub Pages

on:
  push:
    branches: [main]          # Deploys on every push to main
  workflow_dispatch:          # Allows manual runs from the Actions tab

# Set permissions for the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you need a build step (e.g., npm run build), add it here.
      # Example for a simple static site (just copy files):
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        # with:
          # By default, uploads the entire repository root.
          # If your site lives in a subfolder (like /public), specify:
          # path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
