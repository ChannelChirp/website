<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="We are Pudge, Tillie, and Chip! We are the most adorable green-cheeked conures in Australia! Thank you for taking the time to visit and be sure to check out our adventures, a random post, or our YouTube Channel.">
  <title>
  {% if page.type == 'month' %}
    {{ site.title }} – {{ page.date | date: "%B %Y" }}
  {% elsif page.type == 'year' %}
    {{ site.title }} – {{ page.date | date: "%Y" }}
  {% else %}
    {% if page.title == site.title %}
      {{ site.title }}
    {% else %}
      {{ site.title }} – {{ page.title }}
    {% endif %}
  {% endif %}
  </title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- Custom Lighthouse CSS -->
  <link rel="stylesheet" href="{{ '/css/lighthouse.css' | relative_url }}">
  
  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Chirp" />
  <link rel="manifest" href="/favicons/site.webmanifest" />

</head>
